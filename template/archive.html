<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  %(render-head "archive | mahmood")
</head>
<body class="dark-theme">
  #(cltpt/publish:template-file-to-template-obj "header.html")

  <section class="hero">
    <div class="container">
      <h1>post archive</h1>
      <p>all public posts/files</p>
    </div>
  </section>

  <!-- search bar -->
  <div class="container">
    <div class="search-container">
      <input type="text" id="searchBar" class="search-bar" placeholder="Search articles by title...">
    </div>
  </div>

  <!-- archive filters -->
  <div class="container">
    <div class="archive-filters" id="archiveFilters">
      <!-- filter buttons will be populated by javascript -->
    </div>
  </div>

  <!-- archive posts -->
  <div class="container">
    <div class="archive-posts-header">
      <div class="archive-counter" id="archiveCounter">displaying 0 of 0 entries</div>
    </div>
    <div class="archive-posts">
      <div class="posts-list" id="postsList">
        <!-- posts will be populated by javascript -->
      </div>
    </div>
  </div>

  #(cltpt/publish:template-file-to-template-obj "footer.html")
  <script src="/static/main.js"></script>
</body>
</html>
